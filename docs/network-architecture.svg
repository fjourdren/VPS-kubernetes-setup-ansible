<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="900" height="700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: bold 20px sans-serif; fill: #333; }
      .subtitle { font: bold 16px sans-serif; fill: #555; }
      .text { font: 14px sans-serif; fill: #333; }
      .small-text { font: 12px sans-serif; fill: #666; }
      .box { fill: #f0f0f0; stroke: #333; stroke-width: 2; }
      .public-box { fill: #e3f2fd; stroke: #1976d2; stroke-width: 2; }
      .private-box { fill: #fff3e0; stroke: #f57c00; stroke-width: 2; }
      .node-box { fill: #c8e6c9; stroke: #388e3c; stroke-width: 2; }
      .internet { fill: #ffebee; stroke: #c62828; stroke-width: 2; }
      .arrow { fill: none; stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
      .public-arrow { fill: none; stroke: #1976d2; stroke-width: 2; marker-end: url(#arrowhead-blue); }
      .private-arrow { fill: none; stroke: #f57c00; stroke-width: 2; marker-end: url(#arrowhead-orange); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1976d2" />
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#f57c00" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" class="title" text-anchor="middle">Architecture Reseau Kubernetes - MetalLB</text>

  <!-- Internet / External Network -->
  <rect x="50" y="60" width="800" height="80" class="internet" rx="5"/>
  <text x="450" y="85" class="subtitle" text-anchor="middle">Internet / Reseau Local (LAN)</text>
  <text x="450" y="105" class="text" text-anchor="middle">192.168.1.0/24</text>
  <text x="450" y="125" class="small-text" text-anchor="middle">Gateway: 192.168.1.1</text>

  <!-- Kubernetes Node -->
  <rect x="100" y="180" width="700" height="480" class="node-box" rx="5"/>
  <text x="450" y="210" class="subtitle" text-anchor="middle">Kubernetes Node (kubernetes-node01)</text>
  <text x="450" y="230" class="small-text" text-anchor="middle">IP Physique: 192.168.1.201</text>

  <!-- MetalLB Section -->
  <rect x="130" y="250" width="640" height="390" class="box" rx="5"/>
  <text x="450" y="275" class="subtitle" text-anchor="middle">MetalLB Load Balancer</text>

  <!-- Public Pool -->
  <g>
    <rect x="160" y="300" width="280" height="310" class="public-box" rx="5"/>
    <text x="300" y="325" class="subtitle" text-anchor="middle">Public Pool</text>
    <text x="300" y="345" class="text" text-anchor="middle">IP: 192.168.1.210</text>
    <text x="300" y="365" class="small-text" text-anchor="middle">(Accessible depuis LAN)</text>
    
    <!-- Traefik - highlighted as entry point -->
    <rect x="180" y="390" width="240" height="40" fill="#1565c0" stroke="#0d47a1" stroke-width="3" rx="3"/>
    <text x="300" y="410" class="text" text-anchor="middle" fill="white" font-weight="bold">Traefik Public</text>
    <text x="300" y="425" class="small-text" text-anchor="middle" fill="white">80, 443, 25565</text>
    
    <!-- Arrow showing Traefik routes to services -->
    <text x="300" y="450" class="small-text" text-anchor="middle" font-style="italic">Route le trafic vers</text>
    
    <!-- Internal Services (ClusterIP) -->
    <text x="300" y="470" class="small-text" text-anchor="middle" font-weight="bold">Services Internes (ClusterIP):</text>
    
    <rect x="180" y="480" width="240" height="25" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="300" y="497" class="small-text" text-anchor="middle">Grafana</text>
    
    <rect x="180" y="510" width="240" height="25" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="300" y="527" class="small-text" text-anchor="middle">Nextcloud</text>
    
    <rect x="180" y="540" width="240" height="25" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="300" y="557" class="small-text" text-anchor="middle">Keycloak</text>
    
    <rect x="180" y="570" width="240" height="25" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="300" y="587" class="small-text" text-anchor="middle">+ autres apps web...</text>
  </g>

  <!-- Private Pool -->
  <g>
    <rect x="460" y="300" width="280" height="310" class="private-box" rx="5"/>
    <text x="600" y="325" class="subtitle" text-anchor="middle">Private Pool</text>
    <text x="600" y="345" class="text" text-anchor="middle">IP: 192.168.1.220</text>
    <text x="600" y="365" class="small-text" text-anchor="middle">(Cluster uniquement)</text>
    
    <!-- Private Services -->
    <text x="600" y="395" class="text" text-anchor="middle" font-weight="bold">Services (LoadBalancer):</text>
    <text x="600" y="410" class="small-text" text-anchor="middle" font-style="italic">IP partagee, ports differents</text>
    
    <rect x="480" y="425" width="240" height="30" fill="#ffe0b2" stroke="#f57c00" rx="3"/>
    <text x="600" y="445" class="small-text" text-anchor="middle">Traefik Dashboard :443</text>
    
    <rect x="480" y="465" width="240" height="30" fill="#ffe0b2" stroke="#f57c00" rx="3"/>
    <text x="600" y="485" class="small-text" text-anchor="middle">PostgreSQL :5432</text>
    
    <rect x="480" y="505" width="240" height="30" fill="#ffe0b2" stroke="#f57c00" rx="3"/>
    <text x="600" y="525" class="small-text" text-anchor="middle">Redis :6379</text>
    
    <rect x="480" y="545" width="240" height="30" fill="#ffe0b2" stroke="#f57c00" rx="3"/>
    <text x="600" y="565" class="small-text" text-anchor="middle">Elasticsearch :9200</text>
    
    <rect x="480" y="585" width="240" height="15" fill="#ffe0b2" stroke="#f57c00" rx="3"/>
    <text x="600" y="597" class="small-text" text-anchor="middle">...</text>
  </g>

  <!-- Arrows from LAN to pools -->
  <path d="M 300 140 L 300 300" class="public-arrow"/>
  <text x="250" y="220" class="small-text" fill="#1976d2">Acces LAN OK</text>
  
  <path d="M 600 140 L 600 300" class="private-arrow" stroke-dasharray="5,5"/>
  <text x="620" y="200" class="small-text" fill="#f57c00">Acces LAN bloque</text>
  <text x="620" y="215" class="small-text" fill="#f57c00">(pods uniquement)</text>

  <!-- Legend -->
  <g transform="translate(50, 670)">
    <text x="0" y="0" class="text" font-weight="bold">Legende:</text>
    <rect x="10" y="5" width="15" height="15" fill="#1565c0" stroke="#0d47a1"/>
    <text x="30" y="17" class="small-text">Traefik public (LB sur public pool)</text>
    <rect x="250" y="5" width="15" height="15" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="270" y="17" class="small-text">Services web (ClusterIP via Traefik)</text>
    <rect x="500" y="5" width="15" height="15" fill="#ffe0b2" stroke="#f57c00"/>
    <text x="520" y="17" class="small-text">Services prives (LB sur private pool)</text>
  </g>
</svg>
