user:
  username: ansible
  password: <hashed_password>
  local_public_key: /home/<user>/.ssh/id_rsa.pub
ssh:
  port: 30000
network:
  public_domain: "example.com"
  private_domain: "lan"
  base_ip: 192.168.1.201
  host_mask: "255.255.255.0"
  host_gateway: "192.168.1.1"
  host_domain: cluster.lan
  dns: "192.168.1.1" # External DNS server (router or ISP's)Ok
  host_hostname_prefix: kubernetes-node
  public_address: "192.168.1.210"
  private_address: "192.168.1.220"
  private_cidr: "192.168.1.0/24"
nfs:
  # IP or DNS of the NFS server exporting the /app-data and /app-data/important shares
  # (see README, "NFS prerequisites" section)
  server: "192.168.1.200"
velero:
  s3:
    # Scaleway Object Storage by default. Available regions: fr-par, nl-ams, pl-waw.
    # Other S3-compatible providers: Wasabi, Backblaze B2, MinIO, AWS S3.
    access_key: "<your_scaleway_access_key>"
    secret_key: "<your_scaleway_secret_key>"
    endpoint: "https://s3.fr-par.scw.cloud"
    bucket: "homelab-velero"
    region: "fr-par"
  # CRITICAL: losing this password makes all Kopia backups
  # UNRECOVERABLE. Back it up twice (Ansible Vault + external password
  # manager). Generation: openssl rand -base64 48
  repo_password: "<long-random-kopia-repo-password>"
argocd:
  gitlab_username: "<your_gitlab_username>"
  gitlab_token: "<your_gitlab_token>" # scopes : api, read_repository
  gitlab_repo: "homelab"
  gitlab_branch: "main"
letsencrypt:
  email: "<your_email>"
redis:
  password: "<your_redis_password>"
postgresql:
  username: "postgres"
  password: "<your_postgresql_password>"
  ghostfolio_password: "<your_ghostfolio_db_password>"
  nextcloud_password: "<your_nextcloud_db_password>"
ghostfolio:
  jwt_secret: "<your_ghostfolio_jwt_secret>"
  access_token_salt: "<your_ghostfolio_access_token_salt>"
pgadmin:
  email: "<your_pgadmin_email>"
  password: "<your_pgadmin_password>"
nextcloud:
  username: "<your_nextcloud_admin_username>"
  password: "<your_nextcloud_admin_password>"
wordpress:
  db_password: "<your_wordpress_db_password>"
  username: "<your_wordpress_admin_username>"
  password: "<your_wordpress_admin_password>"
  email: "<your_wordpress_admin_email>"
kuma:
  username: "<your_kuma_admin_username>"
  password: "<your_kuma_admin_password>"
minecraft:
  # Used by the Velero pre-backup hook (rcon-cli save-all flush). RCON is bound
  # only on localhost inside the pod; the password is never reachable from
  # outside the cluster.
  rcon_password: "<your_minecraft_rcon_password>"
tailscale:
  # Tailscale admin console -> Settings -> OAuth clients
  # Scopes: Devices Core (read+write) + tag owner tag:k8s-operator
  oauth_client_id: "<oauth_client_id>"
  oauth_client_secret: "<oauth_client_secret>"
  hostname: "homelab-vps-operator"  # TODO : manage multiple nodes with dynamic hostnames (e.g. homelab-node01, homelab-node02, etc.)
  # CIDR advertised to the tailnet by the subnet router. Verify the
  # MicroK8s pod and service CIDRs on the cluster:
  #   microk8s kubectl -n kube-system get cm/kube-proxy -o yaml | grep clusterCIDR
  #   microk8s kubectl cluster-info dump | grep service-cluster-ip-range
  advertise_routes:
    - "192.168.1.0/24"
    - "10.1.0.0/16"        # MicroK8s pod CIDR (default)
    - "10.152.183.0/24"    # MicroK8s service CIDR (default)
cloudflare:
  auth_email: "<your_cloudflare_email>"
  auth_method: "token"
  api_token: "<your_cloudflare_api_token>"
  zone_identifier: "<your_cloudflare_zone_identifier>"
  records:
    #- name: "wordpress.<your_public_domain>"
    #  proxy: "true"
    - name: "nginx.<your_public_domain>"
      proxy: "true"
    - name: "webhook.<your_public_domain>"
      proxy: "true"
n8n_webhook_proxy:
  docker_registry_push: false
  api_key: "<your_n8n_webhook_proxy_api_key>"
  targets:
    default: "http://n8n.n8n.svc.cluster.local/webhook"
crowdsec:
  traefik_bouncer_key: "<your_traefik_bouncer_key>"
  firewall_bouncer_key: "<your_firewall_bouncer_key>"
  enroll_key: "<your_crowdsec_enroll_key>"
falco:
  smtp_hostport: "<your_smtp_host:port>"
  smtp_user: "<your_smtp_user>"
  smtp_password: "<your_smtp_password>"
  smtp_from: "<your_smtp_from_address>"
  smtp_to: "<your_smtp_to_address>"
  smtp_outputformat: "html"