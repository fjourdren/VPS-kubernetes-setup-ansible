################################################################################
#  Namespace
################################################################################
- name: Create nginx namespace
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: nginx

################################################################################
#  Deployment
################################################################################
- name: Deploy Nginx (Deployment)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: nginx
        namespace: nginx
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: nginx
        template:
          metadata:
            labels:
              app: nginx
          spec:
            containers:
              - name: nginx
                image: nginx:latest
                ports:
                  - containerPort: 80
                volumeMounts:
                  - name: nginx-config
                    mountPath: /etc/nginx/conf.d/status.conf
                    subPath: status.conf
            volumes:
              - name: nginx-config
                configMap:
                  name: nginx-status-config

################################################################################
#  ConfigMap for Nginx status endpoint
################################################################################
- name: Create Nginx status ConfigMap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: nginx-status-config
        namespace: nginx
      data:
        status.conf: |
          server {
            listen 8080;
            location /stub_status {
              stub_status on;
              access_log off;
            }
          }

################################################################################
#  Service
################################################################################
- name: Expose Nginx (Service)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: nginx
        namespace: nginx
      spec:
        selector:
          app: nginx
        ports:
          - port: 80
            targetPort: 80
            protocol: TCP
            name: http
          - port: 8080
            targetPort: 8080
            protocol: TCP
            name: metrics-status

################################################################################
#  Certificate (Cert-Manager)
################################################################################
- include_tasks: _cf-acme-cleanup.yml
  vars:
    cf_acme_namespace: nginx
    cf_acme_secret_name: nginx-cert-prod
    cf_acme_dns_name: "nginx.{{ network.public_domain }}"

- name: Request nginx.{{ network.public_domain }} certificate
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata:
        name: nginx-cert-prod
        namespace: nginx
      spec:
        secretName: nginx-cert-prod
        issuerRef:
          name: letsencrypt-prod
          kind: ClusterIssuer
        dnsNames:
          - "nginx.{{ network.public_domain }}"

