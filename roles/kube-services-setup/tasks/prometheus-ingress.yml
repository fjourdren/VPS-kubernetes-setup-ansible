################################################################################
#  IngressRoute - Grafana (Private - HTTP & HTTPS)
################################################################################
- name: Create Grafana IngressRoute
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: grafana
        namespace: monitoring
      spec:
        entryPoints:
          - web-private
          - websecure-private
        routes:
          - match: Host(`grafana.{{ network.private_domain }}`)
            kind: Rule
            services:
              - name: prometheus-community-grafana
                port: 80
            middlewares:
              - name: whitelist-local
                namespace: traefik

################################################################################
#  IngressRoute - Prometheus (Private - HTTP & HTTPS)
################################################################################
- name: Create Prometheus IngressRoute
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: prometheus
        namespace: monitoring
      spec:
        entryPoints:
          - web-private
          - websecure-private
        routes:
          - match: Host(`prometheus.{{ network.private_domain }}`)
            kind: Rule
            services:
              - name: prometheus-community-kube-prometheus
