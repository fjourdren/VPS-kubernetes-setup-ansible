################################################################################
#  NetworkPolicy helper: kube-apiserver egress
#  Allows egress to:
#    - the kubernetes.default Service (TCP/443) — in-cluster, namespace-scoped
#    - the node CIDR on TCP/6443 and TCP/16443 — covers MicroK8s (16443)
#      and vanilla kubeadm (6443) without needing to know which is in use.
#  Required vars:
#    ns: target namespace
#  Creates: <ns>-allow-kubeapi-egress
################################################################################
- name: "[netpol/{{ ns }}] kube-apiserver egress"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: "{{ ns }}-allow-kubeapi-egress"
        namespace: "{{ ns }}"
      spec:
        podSelector: {}
        policyTypes: [Egress]
        egress:
          - to:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: default
            ports:
              - { protocol: TCP, port: 443 }
          - to:
              - ipBlock:
                  cidr: "{{ network.private_cidr }}"
            ports:
              - { protocol: TCP, port: 6443 }
              - { protocol: TCP, port: 16443 }
  # MicroK8s dqlite can transiently return "database is locked" under write bursts
  register: _netpol_apply
  until: _netpol_apply is not failed
  retries: 5
  delay: 5
