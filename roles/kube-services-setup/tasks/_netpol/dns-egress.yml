################################################################################
#  NetworkPolicy helper: DNS egress
#  Egress to CoreDNS (kube-system, k8s-app in [kube-dns, coredns]) on UDP/TCP 53.
#  Required vars:
#    ns: target namespace
#  Creates: <ns>-allow-dns-egress
################################################################################
- name: "[netpol/{{ ns }}] DNS egress"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: "{{ ns }}-allow-dns-egress"
        namespace: "{{ ns }}"
      spec:
        podSelector: {}
        policyTypes: [Egress]
        egress:
          - to:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: kube-system
                podSelector:
                  matchExpressions:
                    - key: k8s-app
                      operator: In
                      values: ["kube-dns", "coredns"]
            ports:
              - { protocol: UDP, port: 53 }
              - { protocol: TCP, port: 53 }
  # MicroK8s dqlite can transiently return "database is locked" under write bursts
  register: _netpol_apply
  until: _netpol_apply is not failed
  retries: 5
  delay: 5
