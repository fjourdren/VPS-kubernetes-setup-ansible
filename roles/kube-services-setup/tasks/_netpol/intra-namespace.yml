################################################################################
#  NetworkPolicy helper: intra-namespace traffic
#  Allow ingress AND egress between pods of the same namespace.
#  Useful for multi-pod stacks (postgresql, redis, prometheus, ...).
#  Required vars:
#    ns: target namespace
#  Creates: <ns>-allow-intra-namespace
################################################################################
- name: "[netpol/{{ ns }}] intra-namespace"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: "{{ ns }}-allow-intra-namespace"
        namespace: "{{ ns }}"
      spec:
        podSelector: {}
        policyTypes: [Ingress, Egress]
        ingress:
          - from:
              - podSelector: {}
        egress:
          - to:
              - podSelector: {}
  # MicroK8s dqlite can transiently return "database is locked" under write bursts
  register: _netpol_apply
  until: _netpol_apply is not failed
  retries: 5
  delay: 5
