################################################################################
#  NetworkPolicy helper: ingress from the Traefik namespace
#  Required vars:
#    ns:           target namespace
#    pod_selector: matchLabels dict identifying the receiving pods
#    port:         single TCP port the pods listen on
#  Optional vars:
#    name_suffix:  policy name suffix (default "traefik")
#  Creates: <ns>-allow-<name_suffix>-ingress
################################################################################
- name: "[netpol/{{ ns }}] {{ name_suffix | default('traefik') }} ingress (port {{ port }})"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: "{{ ns }}-allow-{{ name_suffix | default('traefik') }}-ingress"
        namespace: "{{ ns }}"
      spec:
        podSelector:
          matchLabels: "{{ pod_selector }}"
        policyTypes: [Ingress]
        ingress:
          - from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: traefik
            ports: "{{ [port] | map('community.general.dict_kv', 'port') | map('combine', {'protocol': 'TCP'}) | list }}"
  # MicroK8s dqlite can transiently return "database is locked" under write bursts
  register: _netpol_apply
  until: _netpol_apply is not failed
  retries: 5
  delay: 5
