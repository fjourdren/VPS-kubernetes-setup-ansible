################################################################################
#  Namespace
################################################################################
- name: Create ghostfolio namespace
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: ghostfolio

################################################################################
#  Database Secret
################################################################################
- name: Create Ghostfolio database secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: ghostfolio-db-secret
        namespace: ghostfolio
      type: Opaque
      stringData:
        database_url: "postgresql://ghostfolio:{{ postgresql.ghostfolio_password }}@postgresql.postgresql.svc.cluster.local:5432/ghostfoliodb"

################################################################################
#  Deployment
################################################################################
- name: Deploy Ghostfolio
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ghostfolio
        namespace: ghostfolio
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: ghostfolio
        template:
          metadata:
            labels:
              app: ghostfolio
          spec:
            initContainers:
              - name: wait-for-deps
                image: busybox
                command: ["/bin/sh", "-c", "until nc -z postgresql.postgresql.svc.cluster.local 5432 && nc -z redis-master.redis.svc.cluster.local 6379; do sleep 2; done"]
            containers:
              - name: ghostfolio
                image: ghostfolio/ghostfolio:latest
                env:
                  - name: DATABASE_URL
                    valueFrom:
                      secretKeyRef:
                        name: ghostfolio-db-secret
                        key: database_url
                  - name: REDIS_HOST
                    value: "redis-master.redis.svc.cluster.local"
                  - name: REDIS_PASSWORD
                    value: "{{ redis.password }}"
                  - name: NODE_ENV
                    value: "production"
                  - name: ACCESS_TOKEN_SALT
                    value: "{{ ghostfolio.access_token_salt }}"
                  - name: JWT_SECRET_KEY
                    value: "{{  ghostfolio.jwt_secret }}"
                ports:
                  - containerPort: 3333
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop: ["ALL"]
                readinessProbe:
                  httpGet:
                    path: /api/v1/health
                    port: 3333
                  initialDelaySeconds: 10
                  periodSeconds: 10

################################################################################
#  Service
################################################################################
- name: Create Ghostfolio Service
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: ghostfolio
        namespace: ghostfolio
      spec:
        selector:
          app: ghostfolio
        ports:
          - port: 80
            targetPort: 3333
            protocol: TCP

################################################################################
#  IngressRoute (Traefik v2)
################################################################################
- name: Create Ghostfolio IngressRoute
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: ghostfolio
        namespace: ghostfolio
      spec:
        entryPoints:
          - web-private
          - websecure-private
        middlewares:
          - name: whitelist-local
            namespace: traefik
        routes:
          - match: Host(`ghostfolio.{{ network.private_domain }}`)
            kind: Rule
            services:
              - name: ghostfolio
                port: 80

################################################################################
#  NetworkPolicy
#  See roles/kube-services-setup/tasks/_netpol/README.md for the helpers.
################################################################################
- include_tasks: _netpol/default-deny.yml
  vars: { ns: ghostfolio }

- include_tasks: _netpol/dns-egress.yml
  vars: { ns: ghostfolio }

- include_tasks: _netpol/traefik-ingress.yml
  vars:
    ns: ghostfolio
    pod_selector: { app: ghostfolio }
    port: 3333

- include_tasks: _netpol/egress-to-namespace.yml
  vars:
    ns: ghostfolio
    name: postgresql
    pod_selector: { app: ghostfolio }
    target_namespace: postgresql
    port: 5432

- include_tasks: _netpol/egress-to-namespace.yml
  vars:
    ns: ghostfolio
    name: redis
    pod_selector: { app: ghostfolio }
    target_namespace: redis
    port: 6379

# Ghostfolio talks to financial data APIs (Yahoo, etc.) over HTTPS — 443 only.
- include_tasks: _netpol/web-egress.yml
  vars:
    ns: ghostfolio
    pod_selector: { app: ghostfolio }
    ports: [443]

################################################################################
#  KumaEntity (auto-registered monitor — synced by AutoKuma)
################################################################################
- name: Register Kuma monitor for ghostfolio
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: autokuma.bigboot.dev/v1
      kind: KumaEntity
      metadata:
        name: ghostfolio-monitor
        namespace: ghostfolio
      spec:
        config:
          type: http
          name: ghostfolio
          url: "http://ghostfolio.{{ network.private_domain }}"
          interval: 60
          maxretries: 2
