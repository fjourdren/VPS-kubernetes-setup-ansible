# Redis connection url : redis://default:admin@redis-master.redis.svc.cluster.local:6379

################################################################################
#  Namespace
################################################################################
- name: Create redisinsight namespace
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: redisinsight

################################################################################
#  Deployment
################################################################################
- name: Deploy RedisInsight
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: redisinsight
        namespace: redisinsight
        labels: { app: redisinsight }
      spec:
        replicas: 1
        selector:
          matchLabels: { app: redisinsight }
        template:
          metadata:
            labels: { app: redisinsight }
          spec:
            containers:
              - name: redisinsight
                image: redis/redisinsight:latest   # official repo
                env:
                  - name: RIHOST            # bind on all interfaces (default, kept for clarity)
                    value: "0.0.0.0"
                  - name: RIPORT            # optional – illustrates how to override
                    value: "5540"
                ports:
                  - containerPort: 5540
                volumeMounts:
                  - name: data
                    mountPath: /data                # keeps DBs & settings
            volumes:
              - name: data
                emptyDir: {}                        # swap for PVC in prod

################################################################################
#  Service
################################################################################
- name: Create RedisInsight Service
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: redisinsight
        namespace: redisinsight
      spec:
        selector: { app: redisinsight }
        ports:
          - name: http
            port: 80               # what Traefik will hit
            targetPort: 5540       # container's actual port
            protocol: TCP

################################################################################
#  IngressRoute (Traefik v2)
################################################################################
- name: Create RedisInsight IngressRoute
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: redisinsight
        namespace: redisinsight
      spec:
        entryPoints:
          - web-private
          - websecure-private
        middlewares:
          - name: whitelist-local
            namespace: traefik
        routes:
          - match: Host(`redisinsight.{{ network.private_domain }}`)
            kind: Rule
            services:
              - name: redisinsight
                port: 80

################################################################################
#  NetworkPolicy
#  See roles/kube-services-setup/tasks/_netpol/README.md for the helpers.
################################################################################
- include_tasks: _netpol/default-deny.yml
  vars: { ns: redisinsight }

- include_tasks: _netpol/dns-egress.yml
  vars: { ns: redisinsight }

- include_tasks: _netpol/traefik-ingress.yml
  vars:
    ns: redisinsight
    pod_selector: { app: redisinsight }
    port: 5540

- include_tasks: _netpol/egress-to-namespace.yml
  vars:
    ns: redisinsight
    name: redis
    pod_selector: { app: redisinsight }
    target_namespace: redis
    port: 6379
