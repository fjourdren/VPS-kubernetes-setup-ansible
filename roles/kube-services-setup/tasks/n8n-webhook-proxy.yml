# Uncomment to redirect HTTP to HTTPS
- name: Create n8n-webhook-proxy IngressRoute HTTP Redirect
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: n8n-webhook-proxy-http-redirect
        namespace: n8n-webhook-proxy
      spec:
        entryPoints:
          - web-public
        routes:
          - match: Host(`webhook.{{ network.public_domain }}`)
            kind: Rule
            middlewares:
              - name: public-security
                namespace: traefik
              - name: redirect-to-https
                namespace: traefik
            services:
              - name: n8n-webhook-proxy
                port: 80

- name: Create n8n-webhook-proxy IngressRoute HTTPS
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: n8n-webhook-proxy-https
        namespace: n8n-webhook-proxy
      spec:
        entryPoints:
          - websecure-public
        routes:
          - match: Host(`webhook.{{ network.public_domain }}`)
            kind: Rule
            middlewares:
              - name: public-security
                namespace: traefik
            services:
              - name: n8n-webhook-proxy
                port: 80
        tls:
          secretName: n8n-webhook-proxy-cert-prod
                
################################################################################
#  NetworkPolicy
#  See roles/kube-services-setup/tasks/_netpol/README.md for the helpers.
################################################################################
- include_tasks: _netpol/default-deny.yml
  vars: { ns: n8n-webhook-proxy }

- include_tasks: _netpol/dns-egress.yml
  vars: { ns: n8n-webhook-proxy }

- include_tasks: _netpol/traefik-ingress.yml
  vars:
    ns: n8n-webhook-proxy
    pod_selector: { app: n8n-webhook-proxy }
    port: 3000

# n8n-webhook-proxy -> n8n (port 5678) — must match a specific pod, not just
# the namespace, hence the inline policy rather than egress-to-namespace.yml.
- name: "[netpol/n8n-webhook-proxy] egress -> n8n (port 5678)"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: n8n-webhook-proxy-allow-n8n-egress
        namespace: n8n-webhook-proxy
      spec:
        podSelector:
          matchLabels:
            app: n8n-webhook-proxy
        policyTypes: [Egress]
        egress:
          - to:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: n8n
                podSelector:
                  matchLabels:
                    app: n8n
            ports:
              - { protocol: TCP, port: 5678 }

################################################################################
#  KumaEntity (auto-registered monitor — synced by AutoKuma)
################################################################################
- name: Register Kuma monitor for n8n-webhook-proxy
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: autokuma.bigboot.dev/v1
      kind: KumaEntity
      metadata:
        name: n8n-webhook-monitor
        namespace: n8n-webhook-proxy
      spec:
        config:
          type: http
          name: n8n-webhook
          url: "https://webhook.{{ network.public_domain }}"
          interval: 60
          maxretries: 2
