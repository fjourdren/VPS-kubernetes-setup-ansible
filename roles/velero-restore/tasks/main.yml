################################################################################
#  velero-restore - On-demand Velero restore (disaster recovery)
#
#  Creates a velero.io/v1 Restore: re-creates the PVCs on NFS and restores their
#  contents from Kopia (File System Backup).
################################################################################

- name: Fetch Velero backups
  kubernetes.core.k8s_info:
    api_version: velero.io/v1
    kind: Backup
    namespace: velero
  register: velero_backups

################################################################################
#  List mode - show the available Completed backups and stop
################################################################################
- name: Show available Completed backups (oldest first, newest last)
  ansible.builtin.debug:
    msg: "{{ item.metadata.name }}  [{{ item.status.completionTimestamp | default('?') }}]"
  loop: >-
    {{ velero_backups.resources
       | selectattr('status.phase', 'defined')
       | selectattr('status.phase', 'equalto', 'Completed')
       | sort(attribute='status.completionTimestamp')
       | list }}
  loop_control:
    label: "{{ item.metadata.name }}"
  when: list | bool

- name: Stop after listing
  ansible.builtin.meta: end_play
  when: list | bool

################################################################################
#  Validate parameters
################################################################################
- name: Validate parameters
  ansible.builtin.assert:
    that:
      - mode in ['recover', 'inplace']
      - namespaces | length > 0
      - not (mode == 'recover' and namespaces == 'all')
    fail_msg: >-
      Invalid parameters. Required: namespaces=<a,b|all>; mode in [recover, inplace].
      recover mode cannot be combined with namespaces=all (it needs explicit
      namespaces to build the <ns>-recover mapping).

################################################################################
#  Resolve the backup to restore from
#
#  'latest' = newest scheduled data backup. Two kinds of Completed backup are
#  excluded:
#   - wildcard ('*') cluster-state backups: cannot drive an in-place data restore.
#   - manual backups (no 'velero.io/schedule-name' label): may be contaminated
#     with a duplicate 'restore-db-swap' initContainer -> restore PartiallyFails.
#  Either can still be restored by name (-e backup=<name>).
################################################################################
- name: Identify the Completed scheduled data backups (newest last; wildcard + manual excluded)
  ansible.builtin.set_fact:
    completed_data_backups: >-
      {{ velero_backups.resources
         | selectattr('status.phase', 'defined')
         | selectattr('status.phase', 'equalto', 'Completed')
         | selectattr('spec.includedNamespaces', 'defined')
         | rejectattr('spec.includedNamespaces', 'eq', ['*'])
         | json_query('[?metadata.labels."velero.io/schedule-name"]')
         | sort(attribute='status.completionTimestamp')
         | list }}
  when: backup == 'latest'

- name: Ensure at least one Completed scheduled data backup exists (latest mode)
  ansible.builtin.assert:
    that:
      - completed_data_backups | length > 0
    fail_msg: >-
      No Completed scheduled data backup found. 'latest' resolves to the newest
      schedule-created data backup (nightly-full/weekly-full); wildcard cluster-state
      ('*') backups and ad-hoc/manual backups (no velero.io/schedule-name label) are
      skipped — the former cannot drive an in-place data restore, the latter may be
      contaminated. Pass one explicitly with -e backup=<name> if that is really what
      you want.
  when: backup == 'latest'

- name: Resolve the latest Completed data backup
  ansible.builtin.set_fact:
    backup_name: "{{ completed_data_backups | map(attribute='metadata.name') | list | last }}"
  when: backup == 'latest'

- name: Use the explicitly requested backup
  ansible.builtin.set_fact:
    backup_name: "{{ backup }}"
  when: backup != 'latest'

- name: Verify the resolved backup exists and is Completed
  ansible.builtin.assert:
    that:
      - matching | length == 1
      - matching[0].status.phase | default('') == 'Completed'
    fail_msg: "Backup '{{ backup_name }}' not found or not in Completed phase."
  vars:
    matching: "{{ velero_backups.resources | selectattr('metadata.name', 'equalto', backup_name) | list }}"

################################################################################
#  Build the restore targets
#
#  namespaces=all -> use the namespace set recorded in the backup, so an in-place
#  "all" restore pre-deletes the right namespaces (Velero never overwrites a PVC).
################################################################################
- name: Resolve the namespaces recorded in the chosen backup
  ansible.builtin.set_fact:
    backup_included_namespaces: >-
      {{ (velero_backups.resources
          | selectattr('metadata.name', 'equalto', backup_name)
          | list | first).spec.includedNamespaces | default(['*']) }}

- name: Build the namespace list
  ansible.builtin.set_fact:
    ns_list: >-
      {{ backup_included_namespaces
         if namespaces == 'all'
         else (namespaces.split(',') | map('trim') | select | list) }}

- name: Build the namespace mapping (recover mode)
  ansible.builtin.set_fact:
    namespace_mapping: >-
      {{ dict(ns_list | zip(ns_list | map('regex_replace', '$', '-recover') | list)) }}
  when: mode == 'recover'

################################################################################
#  In-place only (confirm=true): wipe the target namespaces so Velero re-creates
#  their PVCs (it never overwrites existing volumes). Protected namespaces are
#  never deleted; a wildcard backup is left as-is (warning below). Namespaces
#  stuck Terminating are force-cleared so a delete timeout can't block the restore.
################################################################################
- name: Warn that a wildcard backup cannot be pre-deleted in-place
  ansible.builtin.debug:
    msg: >-
      WARNING: backup '{{ backup_name }}' targets all namespaces ('*'). In-place
      restore will NOT pre-delete namespaces, so volume data is only restored for
      namespaces that do not already exist (a wiped cluster). On a live cluster,
      existing PVCs are left untouched. Use a data backup (nightly-full/weekly-full)
      with an explicit namespaces=<a,b,...> list to force an in-place data restore.
  when:
    - mode == 'inplace'
    - "'*' in ns_list"

- name: Compute the in-place namespaces to wipe (protected ones excluded)
  ansible.builtin.set_fact:
    ns_to_wipe: "{{ ns_list | difference(protected_namespaces) }}"
  vars:
    protected_namespaces:
      - velero
      - kube-system
      - kube-public
      - kube-node-lease
      - default
  when:
    - mode == 'inplace'
    - confirm | bool
    - "'*' not in ns_list"

- name: Request deletion of the target namespaces (non-blocking)
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Namespace
    name: "{{ item }}"
    wait: false
  loop: "{{ ns_to_wipe | default([]) }}"
  loop_control:
    label: "{{ item }}"

- name: Force-delete all pods in the target namespaces (skip graceful drain)
  ansible.builtin.command:
    argv:
      - microk8s
      - kubectl
      - delete
      - pod
      - --all
      - "--namespace={{ item }}"
      - --force
      - --grace-period=0
      - --ignore-not-found
  loop: "{{ ns_to_wipe | default([]) }}"
  loop_control:
    label: "{{ item }}"
  changed_when: true
  failed_when: false

- name: Wait for the target namespaces to terminate
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Namespace
    name: "{{ item }}"
  register: ns_terminating
  loop: "{{ ns_to_wipe | default([]) }}"
  loop_control:
    label: "{{ item }}"
  until: ns_terminating.resources | length == 0
  retries: 9           # up to 90s once the pods are gone (9 x 10s)
  delay: 10
  failed_when: false   # genuinely stuck namespaces are force-cleared below

- name: Force-clear namespaces still stuck in Terminating
  when: ns_to_wipe | default([]) | length > 0
  block:
    - name: Strip the kubernetes finalizer from namespaces still Terminating
      ansible.builtin.command:
        argv:
          - microk8s
          - kubectl
          - replace
          - --raw
          - "/api/v1/namespaces/{{ item.item }}/finalize"
          - -f
          - "-"
        stdin: "{{ item.resources[0] | combine({'spec': {'finalizers': []}}, recursive=True) | to_json }}"
      loop: "{{ ns_terminating.results }}"
      loop_control:
        label: "{{ item.item }}"
      when:
        - item.resources | length > 0
        - item.resources[0].status.phase | default('') == 'Terminating'
      changed_when: true
      failed_when: false

    - name: Verify every target namespace is gone before restoring
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: "{{ item }}"
      register: ns_gone
      loop: "{{ ns_to_wipe }}"
      loop_control:
        label: "{{ item }}"
      until: ns_gone.resources | length == 0
      retries: 12          # up to 1 min for the API to drop them (12 x 5s)
      delay: 5

################################################################################
#  In-place only: wait for the wiped namespaces' Delete-policy PVs to be reclaimed
#  before restoring.
#
#  nfs-runtime uses a name-based subDir (<ns>/<pvc>): the old PV points at the same
#  dir Velero re-creates, so a late reclaim wipes the fresh data -> "stale NFS file
#  handle". Draining the reclaimer first avoids it. Retain PVs are left alone.
################################################################################
- name: Wait for the wiped namespaces' Delete-policy PVs to be reclaimed
  kubernetes.core.k8s_info:
    api_version: v1
    kind: PersistentVolume
  register: _orphan_pvs
  until: >-
    (_orphan_pvs.resources | default([])
     | selectattr('spec.claimRef', 'defined')
     | selectattr('spec.persistentVolumeReclaimPolicy', 'equalto', 'Delete')
     | selectattr('spec.claimRef.namespace', 'in', ns_to_wipe)
     | list | length) == 0
  retries: 24          # up to 2 min for the reclaimer to drain
  delay: 5
  failed_when: false   # a PV stuck in VolumeFailedDelete is force-cleared below
  when: ns_to_wipe | default([]) | length > 0

################################################################################
#  In-place only: force-clear Delete-policy PVs stuck un-reclaimed.
#
#  If the PV's NFS dir is already gone, nfs-csi DeleteVolume loops forever and the
#  PV sticks Released, hanging the wait above. Anything still Delete+present after
#  the 2-min drain is stuck: delete it and strip its finalizers (data is gone).
################################################################################
- name: Re-query Delete-policy PVs still un-reclaimed in the wiped namespaces
  kubernetes.core.k8s_info:
    api_version: v1
    kind: PersistentVolume
  register: _stuck_pvs
  when: ns_to_wipe | default([]) | length > 0

- name: Request deletion of the stuck Delete-policy PVs (non-blocking)
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: PersistentVolume
    name: "{{ item.metadata.name }}"
    wait: false
  loop: "{{ _stuck_delete_pvs }}"
  loop_control:
    label: "{{ item.metadata.name }}"
  vars:
    _stuck_delete_pvs: >-
      {{ (_stuck_pvs.resources | default([]))
         | selectattr('spec.claimRef', 'defined')
         | selectattr('spec.persistentVolumeReclaimPolicy', 'equalto', 'Delete')
         | selectattr('spec.claimRef.namespace', 'in', ns_to_wipe | default([]))
         | list }}
  when: ns_to_wipe | default([]) | length > 0

- name: Strip finalizers so the stuck Delete-policy PVs are actually removed
  kubernetes.core.k8s:
    state: patched
    merge_type: merge   # JSON merge patch: replace the finalizers array with []
    api_version: v1
    kind: PersistentVolume
    name: "{{ item.metadata.name }}"
    definition:
      metadata:
        finalizers: []
  loop: "{{ _stuck_delete_pvs }}"
  loop_control:
    label: "{{ item.metadata.name }}"
  vars:
    _stuck_delete_pvs: >-
      {{ (_stuck_pvs.resources | default([]))
         | selectattr('spec.claimRef', 'defined')
         | selectattr('spec.persistentVolumeReclaimPolicy', 'equalto', 'Delete')
         | selectattr('spec.claimRef.namespace', 'in', ns_to_wipe | default([]))
         | list }}
  failed_when: false
  when: ns_to_wipe | default([]) | length > 0

################################################################################
#  In-place only: drop the wiped namespaces' retained (Released) PVs so the
#  restored PVCs re-provision. Deleting a Retain PV keeps its NFS dir (the data),
#  and Velero re-creates the PVC at the same subDir. media-library (non-FSB) is
#  handled by the directory-ensure step below.
################################################################################
- name: Find the wiped namespaces' retained (Released) PVs
  kubernetes.core.k8s_info:
    api_version: v1
    kind: PersistentVolume
  register: _retained_pvs
  when: ns_to_wipe | default([]) | length > 0

- name: Delete the retained PVs so the restored PVCs re-provision (dir preserved)
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: PersistentVolume
    name: "{{ item.metadata.name }}"
  loop: >-
    {{ _retained_pvs.resources | default([])
       | selectattr('spec.claimRef', 'defined')
       | selectattr('spec.claimRef.namespace', 'in', ns_to_wipe | default([]))
       | selectattr('spec.persistentVolumeReclaimPolicy', 'equalto', 'Retain')
       | selectattr('spec.csi', 'defined')
       | selectattr('spec.csi.driver', 'equalto', 'nfs.csi.k8s.io')
       | list }}
  loop_control:
    label: "{{ item.metadata.name }}"
  when: ns_to_wipe | default([]) | length > 0

################################################################################
#  Create the Restore and wait for completion
################################################################################
- name: Create the Velero Restore
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: velero.io/v1
      kind: Restore
      metadata:
        name: "restore-{{ backup_name }}-{{ ansible_date_time.epoch }}"
        namespace: velero
      spec: >-
        {{
          {'backupName': backup_name, 'existingResourcePolicy': 'update'}
          | combine({'includedNamespaces': ns_list} if namespaces != 'all' else {})
          | combine({'namespaceMapping': namespace_mapping} if mode == 'recover' else {})
          | combine({'excludedResources': recover_excluded_resources} if mode == 'recover' else {})
        }}
  register: created_restore

################################################################################
#  In-place only: ensure the NFS dir exists for every volume Velero restores
#  VERBATIM (excluded from FSB, e.g. media-library).
#
#  Such a PV is restored as-is, pointing at a subDir that may no longer exist ->
#  the pod can't mount it -> stays Init -> the restore hangs InProgress forever.
#  We mkdir the empty subDir (via the csi-nfs-node pod); the kubelet then mounts
#  on retry. Idempotent — existing dirs are untouched.
################################################################################
- name: Find the csi-nfs-node pod (used to reach the NFS server)
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: kube-system
    label_selectors:
      - app=csi-nfs-node
  register: _csi_node
  when:
    - mode == 'inplace'
    - ns_to_wipe | default([]) | length > 0

- name: Wait for Velero to (re)create the target namespaces' nfs PersistentVolumes
  kubernetes.core.k8s_info:
    api_version: v1
    kind: PersistentVolume
  register: _post_restore_pvs
  until: >-
    (_post_restore_pvs.resources | default([])
     | selectattr('spec.csi', 'defined')
     | selectattr('spec.csi.driver', 'equalto', 'nfs.csi.k8s.io')
     | selectattr('spec.claimRef', 'defined')
     | selectattr('spec.claimRef.namespace', 'in', ns_to_wipe | default([]))
     | list | length) > 0
  retries: 30          # up to 5 min for Velero to restore the PVs
  delay: 10
  failed_when: false
  when:
    - mode == 'inplace'
    - ns_to_wipe | default([]) | length > 0

- name: Ensure each restored nfs volume's NFS directory exists (create empty if missing)
  ansible.builtin.command:
    argv:
      - microk8s
      - kubectl
      - -n
      - kube-system
      - exec
      - "{{ _csi_node.resources[0].metadata.name }}"
      - -c
      - nfs
      - --
      - sh
      - -c
      - >-
        m="/tmp/ensure-{{ item.metadata.name }}";
        sub="{{ item.spec.csi.volumeAttributes.subDir }}";
        mkdir -p "$m";
        if mount -t nfs -o nfsvers=4.1 "{{ item.spec.csi.volumeAttributes.server }}:{{ item.spec.csi.volumeAttributes.share }}" "$m"; then
        [ -d "$m/$sub" ] || { mkdir -p "$m/$sub" && chmod 0777 "$m/$sub"; };
        umount "$m";
        fi;
        rmdir "$m" 2>/dev/null || true
  loop: >-
    {{ (_post_restore_pvs | default({})).resources | default([])
       | selectattr('spec.csi', 'defined')
       | selectattr('spec.csi.driver', 'equalto', 'nfs.csi.k8s.io')
       | selectattr('spec.claimRef', 'defined')
       | selectattr('spec.claimRef.namespace', 'in', ns_to_wipe | default([]))
       | list }}
  loop_control:
    label: "{{ item.spec.claimRef.namespace }}/{{ item.spec.csi.volumeAttributes.subDir }}"
  changed_when: true
  failed_when: false
  when:
    - mode == 'inplace'
    - ns_to_wipe | default([]) | length > 0
    - _csi_node.resources | default([]) | length > 0

- name: Wait for the restore to finish
  kubernetes.core.k8s_info:
    api_version: velero.io/v1
    kind: Restore
    namespace: velero
    name: "{{ created_restore.result.metadata.name }}"
  register: restore_status
  until: >-
    restore_status.resources | length > 0
    and (restore_status.resources[0].status.phase | default('')
         in ['Completed', 'PartiallyFailed', 'Failed', 'FailedValidation'])
  retries: 120
  delay: 30

################################################################################
#  SQL replay (in-place only)
#
#  PostgreSQL/MySQL back up only a logical dump (all.sql / wordpress.sql), not the
#  datadir, so a restore comes up empty and we replay the dump onto it.
#
#  We relax the liveness probe first: under post-restore load the default 5s
#  pg_isready probe can time out and the kubelet kills postgres mid-replay.
#  We do NOT reset the data PVC — re-provisioning the same subDir breaks the mount.
################################################################################
- name: Relax the PostgreSQL liveness probe before replaying the dump
  kubernetes.core.k8s:
    state: patched
    merge_type: strategic-merge   # merge the container by name; never replace the containers array
    api_version: apps/v1
    kind: StatefulSet
    namespace: postgresql
    name: postgresql
    definition:
      spec:
        template:
          spec:
            containers:
              - name: postgresql
                livenessProbe:
                  failureThreshold: 30
                  periodSeconds: 15
                  timeoutSeconds: 15
  when:
    - mode == 'inplace'
    - "'postgresql' in ns_list"

- name: Replay the PostgreSQL dump onto the restored (empty) datadir
  ansible.builtin.shell: |
    set -e
    NS=postgresql
    # Wait for the freshly-restored PostgreSQL (empty datadir) to be Ready.
    microk8s kubectl -n "$NS" rollout status statefulset postgresql --timeout=300s
    # Replay the logical dump (ON_ERROR_STOP=0 so "already exists" from the initdb
    # scripts is non-fatal). Target the pod + container explicitly.
    microk8s kubectl exec -n "$NS" postgresql-0 -c postgresql -- \
      sh -c 'PGPASSWORD="$(cat "$POSTGRES_PASSWORD_FILE")" psql -v ON_ERROR_STOP=0 -U postgres -h 127.0.0.1 -f /dump/all.sql'
  register: _pg_replay
  until: _pg_replay.rc == 0
  retries: 3
  delay: 15
  changed_when: true
  when:
    - mode == 'inplace'
    - "'postgresql' in ns_list"

- name: Replay mysqldump into MySQL (WordPress)
  ansible.builtin.command:
    argv:
      - microk8s
      - kubectl
      - exec
      - -n
      - wordpress
      - deploy/mysql
      - --
      - sh
      - -c
      - 'mysql -u "$MYSQL_USER" -p"$MYSQL_PASSWORD" "$MYSQL_DATABASE" < /dump/wordpress.sql'
  register: _mysql_replay
  changed_when: true
  failed_when: _mysql_replay.rc != 0
  when:
    - mode == 'inplace'
    - "'wordpress' in ns_list"

################################################################################
#  In-place only: replace the restore-created pods so the next backup is clean.
#
#  The sqlite apps carry a Velero init restore hook ('restore-db-swap') that swaps
#  the consistent snapshot over the live DB. Velero bakes that container into the
#  restored pod; if a backup later captures it, the next restore injects a second
#  one and the pod is rejected ("Duplicate value: restore-db-swap") -> the restore
#  PartiallyFails. So we delete those pods; the controller re-creates a clean one.
#
#  We wait for each pod to be Ready first: init containers finish before the app
#  starts, so Ready means the swap already ran (deleting sooner would preempt it).
################################################################################
- name: List pods in the wiped namespaces (to find restore-injected ones)
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
  register: _post_restore_all_pods
  when:
    - mode == 'inplace'
    - ns_to_wipe | default([]) | length > 0

- name: Wait for each injected pod to become Ready (its restore-db-swap has run)
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: "{{ item.metadata.namespace }}"
    name: "{{ item.metadata.name }}"
  register: _injected_ready
  loop: "{{ _post_restore_all_pods.resources | default([]) }}"
  loop_control:
    label: "{{ item.metadata.namespace }}/{{ item.metadata.name }}"
  until: >-
    _injected_ready.resources | length == 0
    or (_injected_ready.resources[0].status.conditions | default([])
        | selectattr('type', 'equalto', 'Ready')
        | selectattr('status', 'equalto', 'True') | list | length) > 0
  retries: 30          # up to 3 min for init+swap+app start (30 x 6s)
  delay: 6
  failed_when: false   # never block the restore on a slow/failing app pod
  when:
    - mode == 'inplace'
    - ns_to_wipe | default([]) | length > 0
    - item.metadata.namespace in ns_to_wipe
    - >-
      (item.spec.initContainers | default([])
       | map(attribute='name') | select('equalto', 'restore-db-swap')
       | list | length) > 0

- name: Replace the restore-created pods so the next backup is never contaminated
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Pod
    namespace: "{{ item.metadata.namespace }}"
    name: "{{ item.metadata.name }}"
    wait: false
  loop: "{{ _post_restore_all_pods.resources | default([]) }}"
  loop_control:
    label: "{{ item.metadata.namespace }}/{{ item.metadata.name }}"
  when:
    - mode == 'inplace'
    - ns_to_wipe | default([]) | length > 0
    - item.metadata.namespace in ns_to_wipe
    - >-
      (item.spec.initContainers | default([])
       | map(attribute='name') | select('equalto', 'restore-db-swap')
       | list | length) > 0

################################################################################
#  Report
################################################################################
- name: Report restore outcome
  ansible.builtin.debug:
    msg:
      - "Restore:  {{ restore_status.resources[0].metadata.name }}"
      - "Backup:   {{ backup_name }}"
      - "Mode:     {{ mode }}{{ ' (namespaces -> *-recover)' if mode == 'recover' else '' }}"
      - "Targets:  {{ ns_list | join(', ') }}"
      - "Phase:    {{ restore_status.resources[0].status.phase }}"
      - "SQL replay: {{ 'yes' if mode == 'inplace' else 'no (recover mode — replay /dump/*.sql manually if needed)' }}"
      - "Warnings: {{ restore_status.resources[0].status.warnings | default(0) }} / Errors: {{ restore_status.resources[0].status.errors | default(0) }}"

- name: Hint on how to inspect an incomplete restore
  ansible.builtin.debug:
    msg: >-
      Restore did not fully complete. Inspect with:
      `kubectl -n velero describe restore {{ restore_status.resources[0].metadata.name }}`,
      `kubectl -n velero get podvolumerestore`,
      `kubectl -n velero logs deploy/velero`.
  when: restore_status.resources[0].status.phase != 'Completed'
